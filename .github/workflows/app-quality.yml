name: App Quality

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  verify-rn-app:
    name: Verify Taro RN App
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.13.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Android SDK packages
        run: sdkmanager --install "platforms;android-34" "build-tools;34.0.0" "platform-tools" "ndk;25.1.8937393" "cmake;3.22.1"

      - name: Verify app
        run: pnpm verify:app

      - name: Compile Android debug app
        working-directory: apps/com.deppon.app/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Verify debug APK excludes source maps
        run: |
          apk=apps/com.deppon.app/android/app/build/outputs/apk/debug/app-debug.apk
          if unzip -Z1 "$apk" | grep -E '\.map$'; then
            echo "Android APK must not contain source maps." >&2
            exit 1
          fi

      - name: Check native environment
        run: pnpm check:app-native-env
